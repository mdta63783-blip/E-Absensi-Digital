<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E-Absensi Digital</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-color: #f3f4f6; 
        }
        
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            /* Melebihkan tinggi agar bagian bawah tidak terpotong saat ditarik ke atas */
            height: calc(100% + 65px); 
            border: none;
            /* Menarik banner 'Made by Google' keluar dari layar atas */
            margin-top: -65px; 
        }
    </style>
</head>
<body>
    <iframe 
        src="https://script.google.com/a/~/macros/s/AKfycbwO2D8NSckjdRRXix6RBVJIzZBJDsxZa4a78Bngwu8cGKcZJVwjqzAjxE-A4unsrOzsIQ/exec" 
        allow="geolocation; camera; microphone">
    </iframe>
</body>
</html>
